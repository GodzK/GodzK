name: Streak and Items Update

on:
  schedule:
    - cron: '0 0 * * *'   # วันละครั้ง เวลา 07:00 ไทย (UTC+7)
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Initialize or update reward.json
        run: |
          if [ ! -f reward.json ]; then
            echo '{"streak": 0, "gold": 0}' > reward.json
          fi

          node -e "
            const fs = require('fs');
            let data = JSON.parse(fs.readFileSync('reward.json'));

            data.streak++;
            data.gold += 10;

            fs.writeFileSync('reward.json', JSON.stringify(data, null, 2));
          "

          cat reward.json

      - name: Initialize or update item.json
        run: |
          if [ ! -f item.json ]; then
            echo '{"items": {"sword": 1, "shield": 0}}' > item.json
          fi

          node -e "
            const fs = require('fs');
            let itemData = JSON.parse(fs.readFileSync('item.json'));

            itemData.items.shield++;

            fs.writeFileSync('item.json', JSON.stringify(itemData, null, 2));
          "

          cat item.json

      - name: Commit and push changes
        run: |
          git config --global user.name "GodzK"
          git config --global user.email "godzk25@gmail.com"
          git add reward.json item.json
          git commit -m "Streak and Items Update - $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
